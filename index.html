<!DOCTYPE html>
<html>
<body>
    <button type="button" onclick="change_text()">Show Block Height</button>
    <p id="bh">Click button!</p>

    <script>
        function change_text(){
            fetch('https://api-ropsten.etherscan.io/api?module=proxy&action=eth_blockNumber&apikey=YourApiKeyToken')
            .then(response => response.json())
            .then(data => yourNumber = parseInt(data.result, 16))
            .then(data => document.getElementById("bh").innerHTML=yourNumber);
        }
    </script>
</body>
</html>

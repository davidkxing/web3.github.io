<!DOCTYPE html>
<html>
<body>
    <button id="reportbtn" type="button" onclick="change_text()">Show Block Height</button>
    <p id="bh">Click button!</p>

    <script>
        function change_text(){
            document.getElementById("bh").innerHTML = "";
        }

        $("#reportbtn").click(() => {
                $.post("https://api-ropsten.etherscan.io/api?module=proxy&action=eth_blockNumber&apikey=YourApiKeyToken" ).done((data) => alert(data));
        });
    </script>
</body>
</html>
